<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../../../css/baseStyle.css">
  <link rel="stylesheet" href="../../../css/style.css">
  <title>Edit Exam</title>
</head>

<body>
  <div id="menuBTNS"></div>
  <div class="container py-4">
    <h1 class="main-text text-center mb-4 ">Create an Exam</h1>

    <div class="row">

      <!-- LEFT SIDE: EXAM INFORMATION -->
      <div class="col-md-5">

        <div class="card mb-4 mainCard">
          <div id="examName" class="card-header main-text">
            <h3 >Exam Information</h3>
          </div>
          <div class="card-body">
            <div class="mb-2">
              <label class="form-label main-text">Exam Title</label>
              <input id="examTitle" type="text" class="form-control inpt">

            </div>
            <hr>

            <!-- selecting the catagories-->
            <div class="main-text">
            </div>

            <!--the time limitation option -->
            <div class="main-text">
              <h6 class="main-text">update time limit</h6>
              <p></p>
              <input id="timeLimit" type="number" class="form-control inpt">
            </div>
            <hr>

            <button id="saveExamBtn" class="btn btn-primary w-100">
              Save Exam
            </button>

            <div id="builderMessage" class="mt-3"></div>

          </div>
        </div>

      </div>
      <!--RIGHT SIDE -- EXAMS QUESTIONS-->
      <div class="col-md-5">
        <div div="examEdit"  class="card mainCard">

          <div class="card-header main-text">

            <label class="form-label mt-3 second-text">Select a question to edit</label>
            <select id="questionSelect" class="form-select mb-3 inpt"></select>
          </div>
          <div class="card-body">
            <h5 class="main-text"></h5>
            <div class="mb-3">
              <label class="form-label second-text">Question Text</label>
              <input id="questionText" type="text" class="form-control inpt">
            </div>
            <div class="mb-3">
              <label class="form-label second-text">Answer 1</label>
              <input id="answer1" type="text" class="form-control inpt">
            </div>
            <div class="mb-3">
              <label class="form-label second-text">Answer 2</label>
              <input id="answer2" type="text" class="form-control inpt">
            </div>
            <div class="mb-3">
              <label class="form-label second-text">Answer 3</label>
              <input id="answer3" type="text" class="form-control inpt">
            </div>
            <div class="mb-3">
              <label class="form-label second-text">Answer 4</label>
              <input id="answer4" type="text" class="form-control inpt">
            </div>
            <div class="mb-3">
              <label class="form-label second-text">Correct Answer Number</label>
              <input id="correctAnswer" type="number" class="form-control inpt" min="1" max="4">
            </div>
            <div class="mb-3">
              <label class="form-label second-text">Corrent Answer difficulty <span id="diffValue">0</span> </label>
              <input id="questionDiff" type="range" min="0" max="10" value="0">
            </div>
            <button id="addQuestionBtn" class="btn btn-success w-100 mb-2 grn-btn">
              update Question
            </button>

          </div>
        </div>
      </div>

    </div>
  </div>
  <button id="themeToggle">Dark Mode</button>
</body>
<script type="module" src="./Edit.js"></script>

</html>
