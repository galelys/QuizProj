<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../../../css/baseStyle.css">
  <link rel="stylesheet" href="../../../css/style.css">
  <title>Edit Exam</title>
</head>

<body>
  <div class="container py-4">
    <div >
      <div class="col-md-5">
        
      </div>
      <div id="examName"></div>
      <div>
        <div id="questionsBTNCard" class="mainCard col-md-5">


          <label class="form-label mt-3 second-text">Select question:</label>
          <select id="questionSelect" class="form-select mb-3 inpt"></select>

          <div id="questionEditor">

          </div>
          <div class="mb-3">
            <label class="form-label second-text">Correct Answer Number</label>
            <input id="correctAnswer" type="number" class="form-control inpt" min="1" max="4" placeholder="1-4">
          </div>
          <div class="mb-3">
            <label class="form-label second-text">Corrent Answer difficulty <span id="diffValue">0</span> </label>
            <input id="questionDiff" type="range" min="0" max="10" value="0">
          </div>
          <button id="saveQuestionBtn" class="btn btn-success mt-3 grn-btn">
            Save Changes
          </button>

          <button id="deleteQuestionBtn" class="btn btn-danger mt-3">
            Delete Question
          </button>

          <button id="addQuestionBtn" class="btn btn-primary mt-3">
            Add New Question
          </button>
        </div>
      </div>
      <div id="examEdit"></div>
    </div>
  </div>
  <button id="themeToggle">Dark Mode</button>
</body>
<script type="module" src="./Edit.js"></script>

</html>
