<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Latest compiled and minified CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="contact.css">

    <!-- jQuery library -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>

    <!-- Latest compiled JavaScript -->
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/js/bootstrap.min.js"></script>
    <title>CONTACT</title>
</head>

<body  style="background-image: url('leopard_backround.jpg');">
<br>
<br>
    <div class="container p-3 " style="width: 500px;">
        <div class="card" id="shadows">
            <h3 class="card-title"  style="padding: 20px; text-align: center ; color: aliceblue; ">Send a Message</h3>
            <div class="card-body">
                <div class="row">
                    <div class="col-1 p-1 "></div>
                    <div class="col-3 p-1 "><h5>Name:</h5></div>
                </div>
                <div class="row p-1">
                    <div class="col-8 ms-auto">
                        <input id="name" type="text" class="form-control" placeholder="Enter your name"
                            aria-label="Recipient's username" aria-describedby="basic-addon2" >
                    </div>
                </div>
                <div class="row">
                    <div class="col-1 p-1 "></div>
                    <div class="col-3 p-1 "><h5>Email:</h5></div>
                </div>
                <div class="row p-1">
                    <div class="col-8 ms-auto">
                        <input id="email" type="text" class="form-control" placeholder="Enter Email adress"
                            aria-label="Recipient's username" aria-describedby="basic-addon2" >
                    </div>
                </div>
                <div class="row">
                    <div class="col-1 p-1 "></div>
                    <div class="col-3 p-1 "><h5>Phone:</h5> </div>
                </div>
                <div class="row p-1">
                    <div class="col-8 ms-auto">
                        <input id="phone" type="text" class="form-control" placeholder="Enter phone number"
                            aria-label="Recipient's username" aria-describedby="basic-addon2" >
                    </div>
                </div>
                <div class="row">
                    <div class="col-1 p-1 "></div>
                    <div class="col-3 p-1 "><h5> Subject:</h5> </div>
                </div>
                <div class="row p-1">
                    <div class="col-8 ms-auto">
                        <input id="subject" type="text" class="form-control" placeholder="Enter subject"
                            aria-label="Recipient's username" aria-describedby="basic-addon2" >
                    </div>
                </div>
                <div class="row">
                    <div class="col-1 p-1 "></div>
                    <div class="col-3 p-1 "> <h5> Message:</h5></div>
                </div>
                <div class="row p-1">
                    <div class="col-8 ms-auto">
                        <div class="input-group"></div>
                        <textarea id="message" class="form-control" placeholder="Enter your text message here" ></textarea>
                    </div>
                </div>
                <br>
                <div class="row text-center p-2">
                    <div class="col-4"></div>
                    <div class="col-4 p-1 ">
                        <button id="btn_send" type="button" class="btn btn-dark">send message</button>
                    </div>
                </div>

            </div>
            





        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="contact.js"></script>
</body>

</html>
